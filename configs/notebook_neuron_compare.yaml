# 노트북 `01_qwen_neuron_comparison.ipynb` 에서 선택적으로 로드 (YAML_OVERRIDE 경로로 지정)
# 전부 생략 가능 — 노트북 내 EXP 기본값과 병합됩니다.

preset: qwen_reasoning_pair

# models / prompt_groups 를 비우면 프리셋 값 유지. 덮어쓰려면 아래 주석 해제.
# models:
#   non_reasoning: Qwen/Qwen2.5-0.5B-Instruct
#   reasoning: Qwen/Qwen3-0.6B

prompt_groups:
  intuitive:
    - 하늘은 왜 파란색인가요?
  logical:
    - A는 B보다 크고, B는 C보다 큽니다. A와 C 중 어느 것이 더 큰가요?

runtime:
  device: null
  dtype: float32
  max_length: 512
  trust_remote_code: true

analysis:
  target_layer: mid
  heatmap_top_neurons: 200
  differential_top_k: 30
  sae_top_features: 50
  max_prompts_per_group: null
  sae_train:
    epochs: 3
    k: 32
    lr: 0.0003
    l1_coeff: 0.0

tags_for_sae_plot:
  primary: reasoning
  baseline: non_reasoning
