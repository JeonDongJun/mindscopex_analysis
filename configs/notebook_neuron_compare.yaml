# 노트북 `01_qwen_neuron_comparison.ipynb` — 코드 프리셋 없이 전부 YAML
experiment_name: neuron_compare_qwen_pair

models:
  non_reasoning: Qwen/Qwen2.5-7B-Instruct
  reasoning: deepseek-ai/DeepSeek-R1-Distill-Qwen-7B

prompt_groups:
  intuitive:
    - 하늘은 왜 파란색인가요?
    - 봄에는 어떤 꽃이 피나요?
    - 물은 높은 곳에서 낮은 곳으로 흐른다. 맞나요?
    - 사과의 색깔은 보통 무엇인가요?
  logical:
    - A는 B보다 크고, B는 C보다 큽니다. A와 C 중 어느 것이 더 큰가요? 단계별로 추론하세요.
    - 모든 고양이는 동물입니다. 일부 동물은 날 수 있습니다. 따라서 일부 고양이는 날 수 있을까요? 논리적으로 설명하세요.
    - 5명이 원형 테이블에 앉아있습니다. A는 B 옆에, C는 D 맞은편에 앉아있습니다. E는 어디에 앉아있나요?
    - 한 농부가 늑대, 양, 양배추를 강 건너편으로 옮기려 합니다. 보트에는 한 번에 하나만 실을 수 있습니다. 어떻게 해야 할까요?

runtime:
  device: null
  dtype: float32
  max_length: 512
  trust_remote_code: true

analysis:
  target_layer: mid
  heatmap_top_neurons: 200
  differential_top_k: 30
  sae_top_features: 50
  max_prompts_per_group: null
  # SAELens 사전학습 SAE (노트북 §9–10). Qwen 은 registry 에 없을 수 있음 → manual 또는 gpt2 등 프리셋
  pretrained_sae:
    mode: auto # auto | manual | off
    release: null
    sae_id: null
    hook_substring: hook_resid_pre
    # 예: gpt2-small-res-jb + blocks.6.hook_resid_pre (d_in=768, GPT-2 small 전용)
    extra_layers: [] # 비어 있지 않으면 추가 레이어별 SAE 자동 탐색(다운로드 많음)

tags_for_sae_plot:
  primary: reasoning
  baseline: non_reasoning
